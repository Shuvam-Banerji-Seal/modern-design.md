<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#141416"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#ff5b3a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff5b3a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M0 0 H48 V48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Decorative site-tile grid (right side) -->
  <g transform="translate(720, 80)">
    <!-- 6x4 grid of tiles, each 64x48 with 8px gap -->
    <g opacity="0.92">
      <!-- Row 1 -->
      <rect x="0"   y="0"   width="64" height="48" rx="6" fill="#FF5B3A"/>
      <rect x="72"  y="0"   width="64" height="48" rx="6" fill="#1A6DEA"/>
      <rect x="144" y="0"   width="64" height="48" rx="6" fill="#0F1419"/>
      <rect x="216" y="0"   width="64" height="48" rx="6" fill="#312DFB"/>
      <rect x="288" y="0"   width="64" height="48" rx="6" fill="#FA5D29"/>
      <rect x="360" y="0"   width="64" height="48" rx="6" fill="#DC4333"/>
      <!-- Row 2 -->
      <rect x="0"   y="56"  width="64" height="48" rx="6" fill="#5FC4AA"/>
      <rect x="72"  y="56"  width="64" height="48" rx="6" fill="#161616"/>
      <rect x="144" y="56"  width="64" height="48" rx="6" fill="#FAF6EF"/>
      <rect x="216" y="56"  width="64" height="48" rx="6" fill="#0B0C0C"/>
      <rect x="288" y="56"  width="64" height="48" rx="6" fill="#1A1A1A"/>
      <rect x="360" y="56"  width="64" height="48" rx="6" fill="#FEC917"/>
      <!-- Row 3 -->
      <rect x="0"   y="112" width="64" height="48" rx="6" fill="#F8F8F8"/>
      <rect x="72"  y="112" width="64" height="48" rx="6" fill="#000000"/>
      <rect x="144" y="112" width="64" height="48" rx="6" fill="#DC4333"/>
      <rect x="216" y="112" width="64" height="48" rx="6" fill="#0F1419"/>
      <rect x="288" y="112" width="64" height="48" rx="6" fill="#050311"/>
      <rect x="360" y="112" width="64" height="48" rx="6" fill="#000000"/>
      <!-- Row 4 -->
      <rect x="0"   y="168" width="64" height="48" rx="6" fill="#FF9667"/>
      <rect x="72"  y="168" width="64" height="48" rx="6" fill="#ECECEC"/>
      <rect x="144" y="168" width="64" height="48" rx="6" fill="#5E5E5E"/>
      <rect x="216" y="168" width="64" height="48" rx="6" fill="#141414"/>
      <rect x="288" y="168" width="64" height="48" rx="6" fill="#6C00F6"/>
      <rect x="360" y="168" width="64" height="48" rx="6" fill="#FFFFFF"/>
      <!-- Row 5 -->
      <rect x="0"   y="224" width="64" height="48" rx="6" fill="#FFE500"/>
      <rect x="72"  y="224" width="64" height="48" rx="6" fill="#050505"/>
      <rect x="144" y="224" width="64" height="48" rx="6" fill="#0D0D0E"/>
      <rect x="216" y="224" width="64" height="48" rx="6" fill="#79AEFF"/>
      <rect x="288" y="224" width="64" height="48" rx="6" fill="#F1EDE7"/>
      <rect x="360" y="224" width="64" height="48" rx="6" fill="#3787FF"/>
      <!-- Row 6 -->
      <rect x="0"   y="280" width="64" height="48" rx="6" fill="#161616"/>
      <rect x="72"  y="280" width="64" height="48" rx="6" fill="#D79A21"/>
      <rect x="144" y="280" width="64" height="48" rx="6" fill="#BAC4B8"/>
      <rect x="216" y="280" width="64" height="48" rx="6" fill="#FF2EBF"/>
      <rect x="288" y="280" width="64" height="48" rx="6" fill="#FF66A0"/>
      <rect x="360" y="280" width="64" height="48" rx="6" fill="#0A0A0B"/>
    </g>
  </g>

  <!-- Wordmark / accent dot -->
  <g transform="translate(80, 96)">
    <circle cx="0" cy="0" r="9" fill="#FF5B3A"/>
    <circle cx="0" cy="0" r="9" fill="#FF5B3A" opacity="0.35">
      <animate attributeName="r" values="9;22;9" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0;0.35" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Eyebrow pill -->
  <g transform="translate(108, 88)">
    <rect x="0" y="0" width="232" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
    <text x="116" y="22" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#b8b8c0" text-anchor="middle">OPEN-SOURCE · MIT · 36 SITES</text>
  </g>

  <!-- Title -->
  <g transform="translate(80, 200)">
    <text font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="700" fill="#f5f5f7" letter-spacing="-3">
      <tspan x="0" y="0">modern-</tspan>
      <tspan x="0" y="96" fill="#FF5B3A">design.md</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(80, 420)">
    <text font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#b8b8c0" letter-spacing="-0.5">
      <tspan x="0" y="0">Design specs that</tspan>
      <tspan x="0" y="36">another agent can rebuild from.</tspan>
    </text>
  </g>

  <!-- Footer line -->
  <g transform="translate(80, 568)">
    <line x1="0" y1="0" x2="1120" y2="0" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#6e6e78" y="32">
      <tspan x="0">36 design.md files</tspan>
      <tspan x="220">·</tspan>
      <tspan x="240">~30K lines</tspan>
      <tspan x="380">·</tspan>
      <tspan x="400">2-phase dump → sub-agent pipeline</tspan>
      <tspan x="780">·</tspan>
      <tspan x="800" fill="#FF5B3A">shuvam-banerji-seal.github.io/modern-design.md</tspan>
    </text>
  </g>
</svg>
